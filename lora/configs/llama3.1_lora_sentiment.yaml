### model
model_name_or_path: /root/autodl-tmp/fhx/models/Llama-3.1-8B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj

### dataset
dataset: cryptbert_senti,financial_tweets_senti
dataset_dir: /root/autodl-tmp/fhx/crypto_lora/data/sentiment
template: llama3
cutoff_len: 2048
max_samples: 100000             # ★ 放开,用全部数据
overwrite_cache: true
preprocessing_num_workers: 4

### mixing
mix_strategy: interleave_over
interleave_probs: 0.6,0.4

### output
output_dir: /root/autodl-tmp/fhx/crypto_lora/checkpoints/stage1_senti_1
logging_steps: 50
save_steps: 500
save_total_limit: 10             
plot_loss: true
overwrite_output_dir: true
report_to: tensorboard

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 4.0           # ★ 正式训 4 轮
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### eval - 正式训练打开
val_size: 0.02                  # ★ 2% 验证集,从 ~26k 里分 ~500 条
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 500
load_best_model_at_end: true    # ★ 结束后自动加载最佳 checkpoint
metric_for_best_model: eval_loss
greater_is_better: false